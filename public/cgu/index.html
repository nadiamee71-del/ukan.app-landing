<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Conditions d’utilisation — UKAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sora:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --text: #1a1a1a;
        --muted: #6b7280;
        --orange: #ff8a2b;
        --red: #ff4d4d;
        --max: 42rem;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--text);
        background: #fff;
        padding: clamp(1.5rem, 5vw, 2.5rem);
      }
      .wrap {
        max-width: var(--max);
        margin: 0 auto;
      }
      a {
        color: var(--orange);
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        color: var(--red);
        text-decoration: underline;
      }
      h1 {
        font-family: Sora, system-ui, sans-serif;
        font-size: clamp(1.5rem, 4vw, 1.85rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: 0 0 1rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }
      .brand {
        color: var(--orange);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p><a href="/">← Retour au site UKAN</a></p>
      <h1>Conditions d’utilisation</h1>
      <p>
        Les conditions générales d’utilisation du service UKAN seront publiées ici (compte utilisateur,
        contenus, responsabilités, résiliation).
      </p>
      <p>
        Contact : <a class="brand" href="mailto:hello@ukan.app">hello@ukan.app</a>
      </p>
    </div>
  </body>
</html>
